# yolov8s_p2.yaml
# YOLOv8s з додатковою головою P2 (stride=4) для малих цілей.
# SimAM вставляється через forward hooks у model_builder.py,
# тому тут не зазначається.
#
# Архітектура:
#   Backbone (0-9):  CSPDarknet, C2f блоки, SPPF
#   Neck    (10-27): top-down FPN + bottom-up PANet + P2 gілка
#   Head    (28):    Detect на 4 рівнях [P2, P3, P4, P5]

nc: 1      # кількість класів (лише drone)
scales:
  # [depth, width, max_channels]
  s: [0.33, 0.50, 1024]

backbone:
  # [from, repeats, module, args]
  - [-1, 1, Conv,  [64,   3, 2]]   #  0  P1/2   stride=2
  - [-1, 1, Conv,  [128,  3, 2]]   #  1  P2/4   stride=4
  - [-1, 3, C2f,   [128,  True]]   #  2  P2/4
  - [-1, 1, Conv,  [256,  3, 2]]   #  3  P3/8
  - [-1, 6, C2f,   [256,  True]]   #  4  P3/8
  - [-1, 1, Conv,  [512,  3, 2]]   #  5  P4/16
  - [-1, 6, C2f,   [512,  True]]   #  6  P4/16
  - [-1, 1, Conv,  [1024, 3, 2]]   #  7  P5/32
  - [-1, 3, C2f,   [1024, True]]   #  8  P5/32
  - [-1, 1, SPPF,  [1024, 5]]      #  9  P5/32  (SPPF)

head:
  # ── TOP-DOWN FPN (P5 → P4 → P3) ────────────────────────────
  - [-1,   1, nn.Upsample, [None, 2, nearest]]  # 10  upsample P5
  - [[-1, 6], 1, Concat,   [1]]                 # 11  cat backbone P4
  - [-1,   3, C2f,         [512]]               # 12  neck-P4

  - [-1,   1, nn.Upsample, [None, 2, nearest]]  # 13  upsample
  - [[-1, 4], 1, Concat,   [1]]                 # 14  cat backbone P3
  - [-1,   3, C2f,         [256]]               # 15  neck-P3  ← SimAM hook

  # ── РОЗШИРЕННЯ P2 (top-down P3 → P2) ────────────────────────
  - [-1,   1, nn.Upsample, [None, 2, nearest]]  # 16  upsample до P2
  - [[-1, 2], 1, Concat,   [1]]                 # 17  cat backbone P2
  - [-1,   3, C2f,         [128]]               # 18  neck-P2  ← SimAM hook

  # ── BOTTOM-UP PANet (P2 → P3 → P4 → P5) ────────────────────
  - [-1,    1,  Conv, [128, 3, 2]]              # 19  downsample P2→P3
  - [[-1, 15],  1,  Concat, [1]]                # 20  cat neck-P3
  - [-1,    3,  C2f, [256]]                     # 21  final-P3  ← SimAM hook

  - [-1,    1,  Conv, [256, 3, 2]]              # 22  downsample P3→P4
  - [[-1, 12],  1,  Concat, [1]]                # 23  cat neck-P4
  - [-1,    3,  C2f, [512]]                     # 24  final-P4  ← SimAM hook

  - [-1,    1,  Conv, [512, 3, 2]]              # 25  downsample P4→P5
  - [[-1,  9],  1,  Concat, [1]]                # 26  cat SPPF
  - [-1,    3,  C2f, [1024]]                    # 27  final-P5

  # ── DETECTION HEADS (P2=18, P3=21, P4=24, P5=27) ────────────
  - [[18, 21, 24, 27], 1, Detect, [nc]]         # 28
